services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      FRONTEND_URLS: ${FRONTEND_URLS}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
      YANDEX_PARSER_NODE_BINARY: node
      YANDEX_PARSER_SCRIPT_PATH: /var/www/html/yandex-parser.js
      YANDEX_PARSER_MAX_REVIEWS: ${YANDEX_PARSER_MAX_REVIEWS:-700}
      YANDEX_PARSER_TIMEOUT: ${YANDEX_PARSER_TIMEOUT:-300}
      YANDEX_PARSER_DEBUG: ${YANDEX_PARSER_DEBUG:-false}
      YANDEX_PARSER_DEBUG_DIR: /var/www/html/storage/app/parser-debug
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
